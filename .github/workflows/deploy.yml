name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Maven
        run: mvn clean package -DskipTests

      - name: Build Docker
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest .

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push Docker
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-maven:latest
