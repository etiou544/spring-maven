name: CI/CD Full Pipeline

on:
  push:
    branches: [ main ]

env:
  IMAGE_NAME: spring-maven

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🧪 Build Maven
        run: mvn clean package -DskipTests

      - name: 🐳 Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/spring-maven:latest .

      - name: 🔑 Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 📦 Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/spring-maven:latest

      - name: 🚀 Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop spring-app || true
            docker rm spring-app || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-maven:latest
            docker run -d -p 80:8080 --name spring-app ${{ secrets.DOCKER_USERNAME }}/spring-maven:latest
